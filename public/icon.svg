<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="glow" x1="256" y1="120" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="128" y1="96" x2="128" y2="416"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="384" y1="96" x2="384" y2="416"/>
    <line x1="96" y1="192" x2="416" y2="192"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="320" x2="416" y2="320"/>
  </g>

  <!-- Open box base -->
  <g filter="url(#shadow)">
    <!-- Box bottom -->
    <path d="M136 340 L176 380 L336 380 L376 340 Z" fill="#4c1d95" stroke="#7c3aed" stroke-width="2"/>
    <!-- Box left wall -->
    <path d="M136 340 L136 240 L176 280 L176 380 Z" fill="#5b21b6" stroke="#7c3aed" stroke-width="2"/>
    <!-- Box right wall -->
    <path d="M376 340 L376 240 L336 280 L336 380 Z" fill="#6d28d9" stroke="#7c3aed" stroke-width="2"/>
    <!-- Box rim left -->
    <path d="M108 220 L136 240 L176 280 L148 260 Z" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Box rim right -->
    <path d="M404 220 L376 240 L336 280 L364 260 Z" fill="#8b5cf6" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Box rim front -->
    <path d="M148 260 L176 280 L336 280 L364 260 L392 240 L120 240 Z" fill="#7c3aed" opacity="0.8"/>
  </g>

  <!-- Globe/sphere emerging from box -->
  <g filter="url(#glowFilter)">
    <circle cx="256" cy="190" r="80" fill="url(#glow)" opacity="0.2"/>
    <circle cx="256" cy="190" r="64" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.8"/>
    <!-- Globe meridians -->
    <ellipse cx="256" cy="190" rx="32" ry="64" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="256" cy="190" rx="56" ry="64" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <!-- Globe equator -->
    <ellipse cx="256" cy="190" rx="64" ry="18" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
    <!-- Land masses -->
    <path d="M230 165 Q240 155 252 158 Q260 150 270 155 Q278 160 272 170 Q265 175 255 172 Q242 175 235 168 Z" fill="#a78bfa" opacity="0.4"/>
    <path d="M260 195 Q270 188 282 192 Q290 198 285 208 Q275 212 268 205 Q258 200 260 195 Z" fill="#a78bfa" opacity="0.35"/>
    <path d="M220 188 Q228 182 238 186 Q232 195 222 192 Z" fill="#a78bfa" opacity="0.3"/>
  </g>

  <!-- Floating text particles (words) -->
  <g opacity="0.7">
    <text x="160" y="148" font-family="Georgia, serif" font-size="16" fill="#c4b5fd" transform="rotate(-12 160 148)">字</text>
    <text x="330" y="138" font-family="Georgia, serif" font-size="14" fill="#ddd6fe" transform="rotate(8 330 138)">界</text>
    <text x="185" y="120" font-family="Georgia, serif" font-size="12" fill="#c4b5fd" transform="rotate(-5 185 120)">生</text>
    <text x="310" y="160" font-family="Georgia, serif" font-size="13" fill="#ddd6fe" transform="rotate(15 310 160)">命</text>
    <text x="148" y="180" font-family="Georgia, serif" font-size="11" fill="#c4b5fd" opacity="0.5">言</text>
    <text x="355" y="185" font-family="Georgia, serif" font-size="11" fill="#ddd6fe" opacity="0.5">道</text>
  </g>

  <!-- Sparkle dots -->
  <circle cx="190" cy="130" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="320" cy="120" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="256" cy="105" r="3" fill="url(#gold)" filter="url(#glowFilter)" opacity="0.9"/>
  <circle cx="370" cy="150" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="145" cy="160" r="1.5" fill="#fbbf24" opacity="0.5"/>

  <!-- Title text -->
  <text x="256" y="450" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="52" fill="#e2e8f0" letter-spacing="4">
    WordBox
  </text>
  <text x="256" y="478" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="18" fill="#a78bfa" letter-spacing="6">
    WORLD SIMULATION
  </text>
</svg>
